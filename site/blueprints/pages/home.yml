# Each page blueprint must have a title, the title may be different from the file name
title: Home

# Each page can have an icon that is shown in page listings when no preview image is available.
icon: 🏠

# Page options allow you to control how users can interact with the page.
# Here we prevent changing the page status (the home page cannot be renamed or deleted by default)
# More about page options: https://getkirby.com/docs/reference/panel/blueprints/page#options
options:
  changeStatus: false

# Here we define an info section and a pages section (`photography`)
tabs:
  content:
    icon: palette
    sections:
      content:
        type: fields
        fields:
          headline:
            type: text
            width: 1/2
          gap:
            width: 1/2
          subheadline:
            type: text
            width: 1/2
          intro:
            type: structure
            fields:
              scenes:
                type: structure
                help: Scenes will occur sequentially and superpose one another
                fields:
                  images_ft:
                    label: Appears from top
                    type: files
                  images_fb:
                    label: Appears from bottom
                    type: files
                  images_fade:
                    label: Appears from opacity 0
                    type: files
                  animation_mode:
                    type: select
                    required: true
                    default: none
                    options:
                      none: none
                      stagger: Stagger
                      random: Random
                      simultaneous: Simultaneous
              background_image:
                type: files
                multiple: false
                help: Will always be visible if defined
              background_color:
                type: color
                alpha: true
          hiatus:
            type: textarea
            size: small
            files: false
            buttons:
              - bold
              - link
          callToAction:
            type: structure
            fields:
              label:
                type: text
                required: true
              projects:
                type: pages
                query: site.children.published
                min: 1
                required: true

  seo:
    extends: tabs/seo
