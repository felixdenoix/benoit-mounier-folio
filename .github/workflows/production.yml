name: Production Deployment
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3" # Specify your desired PHP version
          extensions: gd, zip # List required
      - name: Install composer dependencies
        # Replaced the Docker action with a native run command.
        run: composer install --no-dev --optimize-autoloader --no-progress
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - name: FTP Deployment
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.ftp_server }}
          username: ${{ secrets.ftp_user }}
          password: ${{ secrets.ftp_password }}
          protocol: ftps
          port: 21
          timeout: 360000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            content/**
            storage/**
            public/media/**
            .ddev/**
            .husky/**
            src/**
            pnpm-workspace.yaml
            pnpm-lock.yaml
            package.json
            vite.config.js
            tsconfig.json
            lint-staged.config.js
            .editorconfig
            .oxfmtrc.json
            composer.lock
            .phpactor.json
            .php-cs-fixer.dist.php

      - name: Trigger Cache Clearing
        run: |
          curl -f -L -X POST "https://benoit.felixdenoix.fr/clear-my-cache-pretty-please/${{ secrets.DEPLOY_TOKEN }}"
