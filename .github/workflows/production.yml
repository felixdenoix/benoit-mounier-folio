name: Production Deployment
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run build
      - name: FTP Deployment
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.ftp_server }}
          username: ${{ secrets.ftp_user }}
          password: ${{ secrets.ftp_password }}
          protocol: ftps
          port: 21
          timeout: 360000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            content/**
            .ddev/**
            .husky
            pnpm-workspace.yaml
            pnpm-lock.yaml
            lint-staged.config.js
            .editorconfig
            .oxfmtrc.json
            composer.lock
            .phpactor.json
            .php-cs-ficer.dist.php
            src/**
            .husky/**
